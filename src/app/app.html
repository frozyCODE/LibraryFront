<div class="container">
  <header>
    <h1>Ma Bibliothèque</h1>
    <p class="text-muted">Gestion simple de mes livres</p>
  </header>

  <!-- Formulaire (Ajout ou Modification) -->
  <div class="form-card">
    <h3>{{ isEditing ? 'Modifier le livre' : 'Ajouter un nouveau livre' }}</h3>
    <form (submit)="onSubmit(); $event.preventDefault()">
      <div class="form-group">
        <label>Titre</label>
        <input type="text" name="title" [(ngModel)]="newBook.title" placeholder="Ex: Germinal" required>
      </div>
      
      <div class="form-group">
        <label>Auteur</label>
        <input type="text" name="author" [(ngModel)]="newBook.author" placeholder="Ex: Émile Zola" required>
      </div>

      <div class="form-group">
        <label>Année</label>
        <input type="number" name="year" [(ngModel)]="newBook.year" required>
      </div>

      <button type="submit" class="btn-add">
        {{ isEditing ? 'Mettre à jour' : 'Enregistrer' }}
      </button>
      
      @if (isEditing) {
        <button type="button" (click)="cancelEdit()" class="btn-cancel" style="margin-top: 10px; background: #95a5a6; color: white; border: none; padding: 10px; width: 100%; cursor: pointer; font-weight: bold;">
          Annuler la modification
        </button>
      }
    </form>
  </div>

  <!-- Liste des livres -->
  <div class="book-list">
    @for (book of books(); track book.id) {
      <div class="book-item">
        <div class="book-info">
          <h3>{{ book.title }}</h3>
          <p>Auteur : {{ book.author }}</p>
        </div>
        <div class="actions">
          <span class="year">{{ book.year }}</span>
          <button (click)="startEdit(book)" class="btn-edit" style="background: #3498db; color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 3px;">Modifier</button>
          <button (click)="deleteBook(book.id)" class="btn-delete">Supprimer</button>
        </div>
      </div>
    } @empty {
      <p style="text-align: center; color: #999;">Aucun livre enregistré.</p>
    }
  </div>
</div>

<router-outlet />
