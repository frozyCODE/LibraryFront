<div class="container">
  <header>
    <h1>Ma Bibliothèque</h1>
    <p class="text-muted">Gestion simple de mes livres</p>
  </header>

  <!-- Formulaire d'ajout -->
  <div class="form-card">
    <h3>Ajouter un nouveau livre</h3>
    <form (submit)="addBook(); $event.preventDefault()">
      <div class="form-group">
        <label>Titre</label>
        <input type="text" name="title" [(ngModel)]="newBook.title" placeholder="Ex: Germinal" required>
      </div>
      
      <div class="form-group">
        <label>Auteur</label>
        <input type="text" name="author" [(ngModel)]="newBook.author" placeholder="Ex: Émile Zola" required>
      </div>

      <div class="form-group">
        <label>Année</label>
        <input type="number" name="year" [(ngModel)]="newBook.year" required>
      </div>

      <button type="submit" class="btn-add">Enregistrer</button>
    </form>
  </div>

  <!-- Liste des livres -->
  <div class="book-list">
    @for (book of books(); track book.id) {
      <div class="book-item">
        <div class="book-info">
          <h3>{{ book.title }}</h3>
          <p>Auteur : {{ book.author }}</p>
        </div>
        <div class="actions">
          <span class="year">{{ book.year }}</span>
          <button (click)="deleteBook(book.id)" class="btn-delete">Supprimer</button>
        </div>
      </div>
    } @empty {
      <p style="text-align: center; color: #999;">Aucun livre enregistré.</p>
    }
  </div>
</div>

<router-outlet />
